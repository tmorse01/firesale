[build]
builder = "RAILPACK"
buildCommand = "FIRESALE_SERVICE_TARGET=api npm run build"
watchPatterns = [
  "/apps/api/**",
  "/packages/shared/**",
  "/scripts/build-service.mjs",
  "/scripts/start-service.mjs",
  "/package.json",
  "/package-lock.json",
  "/tsconfig.base.json"
]

[deploy]
startCommand = "FIRESALE_SERVICE_TARGET=api npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
